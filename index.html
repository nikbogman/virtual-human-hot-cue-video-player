<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Human Video Segment Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div id="player-section">
            <div id="drop-zone">
                <div id="drop-zone-inner">
                    <p>Drop a video file here</p>
                    <span>or</span>
                    <label class="btn" for="file-input">Browse file</label>
                </div>
            </div>
            <video id="video" controls></video>
        </div>
        <div id="toolbar">
            <input type="file" id="file-input" accept="video/*" hidden>
            <div id="hot-cue-bar"></div>
        </div>
        <details id="session-log">
            <summary>
                <span>Session log (<span id="log-count">0</span>)</span>
                <div class="log-actions">
                    <button id="export-btn" class="btn">Export JSON</button>
                    <button id="clear-btn" class="btn">Clear</button>
                </div>
            </summary>
            <div id="log-entries"></div>
        </details>
    </div>
    <script src="app.js"></script>
</body>

</html>
