<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple click box</title>
  <style>
    * { margin: 0; }
    #bg {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #box {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      background: white;
      border: 2px solid black;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <video id="bg" autoplay loop playsinline src="background.mp4"></video>
  <div id="box"></div>
  <script>
    document.getElementById('box').onclick = function () {
      this.textContent = this.textContent ? '' : '✓'
    }
  </script>
</body>
</html>
